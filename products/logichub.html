<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogicHub Forge | Aporaksha</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap");
    :root {
      --bg: #0B1120; --surface: #1E293B; --border: #334155;
      --text: #F8FAFC; --muted: #94A3B8; --accent: #FF671F;
      --font: 'DM Sans', system-ui, sans-serif;
    }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: var(--font); line-height: 1.6;
    }
    .topbar {
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .topbar a:hover { color: var(--text); }
    .container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
    .icon { font-size: 3rem; color: #ffab91; margin-bottom: 1rem; }
    h1 { font-size: 3rem; margin: 0 0 1rem; letter-spacing: -1px; }
    .subtitle { font-size: 1.25rem; color: var(--muted); margin-bottom: 3rem; }
    .feature-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-bottom: 4rem; }
    .feature { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
    .feature h3 { margin: 0 0 0.5rem; color: var(--accent); }
    .feature p { margin: 0; font-size: 0.95rem; color: var(--muted); }
    .btn {
      display: inline-block; background: var(--accent); color: #000; font-weight: 600;
      padding: 0.8rem 2rem; border-radius: 8px; text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <nav class="topbar">
    <a href="/">&larr; Back to Ecosystem</a>
    <a href="/" style="font-weight:700;color:var(--text);">Aporaksha</a>
  </nav>
  <main class="container">
    <div class="icon">&#x2692;</div>
    <h1>LogicHub Forge</h1>
    <p class="subtitle">Custom engineering solutions for teams moving off cloud architectures onto sovereign local clusters.</p>
    
    <div class="feature-grid">
      <div class="feature">
        <h3>Custom Integrations</h3>
        <p>We work directly with your team to integrate Zayvora reasoning loops into your existing internal tools.</p>
      </div>
    </div>

    <a href="/#marketplace" class="btn">Configure Build</a>
  </main>
</body>
</html>
